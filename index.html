    <style>
      /* ── Inline critical styles so loader shows before any CSS bundle ── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: #0c0c0c;
      }

      #loader {
        position: fixed;
        inset: 0;
        background: #0c0c0c;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }
      #loader.out {
        opacity: 0;
        pointer-events: none;
      }
      #loader-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      #loader-wordmark {
        font-family: sans-serif;
        font-size: 13px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(179, 243, 129, 0.5);
      }
      #loader-bar-track {
        width: 120px;
        height: 1px;
        background: rgba(179, 243, 129, 0.15);
        overflow: hidden;
      }
      #loader-bar-fill {
        height: 100%;
        width: 0%;
        background: #b3f381;
        animation: loader-grow 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes loader-grow {
        0%   { width: 0%; }
        60%  { width: 85%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Loader — visible immediately, before React mounts -->
    <div id="loader">
      <div id="loader-inner">
        <div id="loader-wordmark">JozeDzn</div>
        <div id="loader-bar-track">
          <div id="loader-bar-fill"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
