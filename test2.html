<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Animation Test 2 — Exact Index Structure</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0fde6; overflow-x: clip; }

/* EXACT same hero CSS as style.css */
.hero {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 60px 144px;
}
.hero__bg {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: -80px;
}
.hero__bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center bottom;
  display: block;
}
.hero__elements {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
}
.navbar { 
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 100; padding: 8px 16px; color: #f0fde6; font-family: sans-serif;
  opacity: 0;
}
.page-wrapper { position: relative; width: 100%; min-height: 100vh; }
.scroll-progress, .custom-cursor { display: none; }
</style>
</head>
<body>

  <div class="scroll-progress" id="scrollProgress"></div>
  <div class="custom-cursor" id="customCursor"></div>

  <nav class="navbar hero-hidden" id="navbar">NAVBAR</nav>

  <div class="page-wrapper">
    <section class="hero" id="hero">
      <div class="hero__bg" id="heroBg">
        <img src="assets/images/bg-top.png" alt="" aria-hidden="true">
      </div>

      <div class="hero__elements" id="heroElements">
        <div class="hero__content">
          <h1 class="hero__title" id="heroTitle" style="color:#b3f381; font-size:clamp(80px,34vw,497px); text-align:center;">JozeDzn</h1>
          <div class="hero__subtitle" id="heroSubtitle" style="color:#e36085; font-size:24px; display:flex; justify-content:space-between; width:100%; opacity:0;">
            <span>Based in Mexico</span>
            <span>Motion · 3D · Web · Games</span>
          </div>
        </div>
      </div>
    </section>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const heroBg = document.getElementById('heroBg');
  console.log('heroBg element:', heroBg);
  console.log('heroBg dimensions:', heroBg.offsetWidth, heroBg.offsetHeight);
  
  gsap.fromTo(heroBg,
    { scaleY: 0, transformOrigin: 'top center' },
    { 
      scaleY: 1, duration: 2, ease: 'power3.out', delay: 0.5,
      onStart: () => console.log('BG animation STARTED'),
      onComplete: () => console.log('BG animation COMPLETE'),
    }
  );
});
</script>

</body>
</html>
