<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Animation Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f0fde6;
  min-height: 200vh;
}

.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero__bg {
  position: absolute;
  inset: 0;
  bottom: -80px;
}

.hero__bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center bottom;
  display: block;
}

.hero__content {
  position: relative;
  z-index: 1;
  color: #b3f381;
  font-size: 80px;
  font-family: sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero__bg" id="heroBg">
    <img src="assets/images/bg-top.png" alt="">
  </div>
  <div class="hero__content">TEST</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
// Test 1: Simple scaleY reveal from top
gsap.fromTo('#heroBg', 
  { scaleY: 0, transformOrigin: 'top center' },
  { scaleY: 1, duration: 2, ease: 'power3.out', delay: 0.5 }
);
</script>

</body>
</html>
